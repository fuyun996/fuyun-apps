server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx;
    index index.html;

    location = / {
        try_files /portal/index.html =404;
    }

    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
    }

    location /weiqi/ {
        try_files $uri $uri/ /weiqi/index.html;
    }

    location /xiangqi/ {
        try_files $uri $uri/ /xiangqi/index.html;
    }

    location / {
        try_files $uri $uri/ /portal/index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
