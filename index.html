<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuyun Apps</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AI-Assisted Mini Games Collection</p>
        <h1>Fuyun Apps</h1>
        <p class="intro">
          一个持续扩展中的小游戏与应用合集。当前已经接入门户首页、围棋和中国象棋，后续还会继续加入更多棋类与休闲项目。
        </p>
        <div class="actions">
          <a class="primary-link" href="./portal/index.html">进入小游戏门户</a>
          <a class="secondary-link" href="https://github.com/fuyun996/fuyun-apps">查看 GitHub 仓库</a>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <span class="tag">门户</span>
          <h2>小游戏大厅</h2>
          <p>统一承载所有小游戏入口，负责展示已上线项目与后续规划。</p>
          <a href="./portal/index.html">打开 portal</a>
        </article>

        <article class="card">
          <span class="tag">围棋</span>
          <h2>围棋游戏</h2>
          <p>支持多棋盘尺寸、人机对战、规则切换、自动数目和 SGF 导入导出。</p>
          <a href="./weiqi/index.html">打开 weiqi</a>
        </article>

        <article class="card">
          <span class="tag">象棋</span>
          <h2>中国象棋</h2>
          <p>支持双人对弈、人机对战、残局库切换和棋谱导出。</p>
          <a href="./xiangqi/index.html">打开 xiangqi</a>
        </article>
      </section>
    </main>
  </body>
</html>
